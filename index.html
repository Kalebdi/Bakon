<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<title>Simple URL Shortener</title>

<style>
body{
font-family:Arial, sans-serif;
background:#0f172a;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.container{
background:#1e293b;
padding:30px;
border-radius:12px;
text-align:center;
width:400px;
box-shadow:0 0 20px rgba(0,0,0,0.4);
}

input{
width:90%;
padding:10px;
margin-top:10px;
border:none;
border-radius:6px;
}

button{
margin-top:15px;
padding:10px 20px;
border:none;
border-radius:6px;
background:#3b82f6;
color:white;
cursor:pointer;
}

button:hover{
background:#2563eb;
}

.result{
margin-top:20px;
word-break:break-all;
}
</style>

</head>

<body>

<div class="container">

<h2>URL Shortener</h2>

<input id="url" placeholder="Paste your long URL here">

<br>

<button onclick="shorten()">Shorten</button>

<div class="result" id="result"></div>

</div>

<script>

function randomCode(length){
const chars="ABCDEFGHJKLMNPQRSTUVWXYZabcdefghijkmnopqrstuvwxyz23456789"
let out=""

for(let i=0;i<length;i++){
out+=chars[Math.floor(Math.random()*chars.length)]
}

return out
}

function shorten(){

let url=document.getElementById("url").value

if(!url){
alert("Masukkan URL dulu")
return
}

let code=randomCode(6)

let shortLink=location.origin+"/#"+code

document.getElementById("result").innerHTML =
"Short Link:<br><a href='"+url+"' target='_blank'>"+shortLink+"</a>"

}

</script>

</body>
</html>
