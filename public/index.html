<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SOLITOOLS</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:opsz,wght@9..40,400;500;600;700&display=swap" rel="stylesheet">
<style>
/* --- CSS VARIABLES --- */
:root {
  --primary: #6366f1;
  --primary-dark: #4f46e5;
  --secondary: #8b5cf6;
  --accent: #06b6d4;
  --bg-dark: #020617;
  --bg-card: rgba(30, 41, 59, 0.9);
  --bg-input: rgba(15, 23, 42, 0.8);
  --bg-result: rgba(99, 102, 241, 0.08);
  --border: rgba(255,255,255,0.15);
  --text-main: #f8fafc;
  --text-muted: #cbd5e1;
  --radius: 16px;
  --radius-sm: 12px;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
  font-family: 'DM Sans', sans-serif;
  background-color: var(--bg-dark);
  background-image: 
    radial-gradient(circle at 20% 10%, rgba(99, 102, 241, 0.15), transparent 40%),
    radial-gradient(circle at 80% 90%, rgba(139, 92, 246, 0.15), transparent 40%);
  color: var(--text-main);
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: flex-start;
  padding: 20px 16px 40px;
}

.app {
  width: 100%;
  max-width: 480px;
  background: var(--bg-card);
  backdrop-filter: blur(20px);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 24px 20px;
  box-shadow: 0 10px 40px rgba(0,0,0,0.5);
}

.header { text-align: center; margin-bottom: 24px; }
.header h1 {
  font-family: 'Syne', sans-serif;
  font-size: 32px;
  font-weight: 800;
  background: linear-gradient(135deg, #fff, #a5f3fc);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  margin-bottom: 4px;
}
.header p { color: var(--text-muted); font-size: 15px; }

.tabs {
  display: flex;
  background: rgba(0,0,0,0.3);
  padding: 5px;
  border-radius: 12px;
  margin-bottom: 24px;
  border: 1px solid var(--border);
}
.tab {
  flex: 1;
  padding: 14px;
  border: none;
  background: transparent;
  color: var(--text-muted);
  font-weight: 700;
  font-size: 15px;
  border-radius: 10px;
  cursor: pointer;
  transition: all 0.2s ease;
}
.tab.active {
  background: linear-gradient(135deg, var(--primary), var(--secondary));
  color: white;
  box-shadow: 0 4px 12px rgba(99, 102, 241, 0.4);
}
.tab:hover:not(.active) {
  background: rgba(255,255,255,0.05);
  color: var(--text-main);
}

.panel { display: none; }
.panel.active { display: block; animation: fadeIn 0.3s ease; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

.label {
  font-size: 13px;
  font-weight: 700;
  text-transform: uppercase;
  color: var(--primary);
  margin-bottom: 10px;
  display: block;
  letter-spacing: 0.5px;
}

.input-row {
  display: flex;
  flex-direction: column;
  gap: 12px;
  margin-bottom: 20px;
}

.inp {
  width: 100%;
  background: var(--bg-input);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 16px;
  color: var(--text-main);
  font-size: 16px;
  font-family: inherit;
  transition: all 0.2s ease;
}
.inp:focus {
  border-color: var(--primary);
  outline: none;
  box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
  background: rgba(15, 23, 42, 0.9);
}
.inp::placeholder { color: rgba(203, 213, 225, 0.5); }

.btn-gen {
  width: 100%;
  background: linear-gradient(135deg, var(--primary), var(--secondary));
  color: white;
  border: none;
  border-radius: var(--radius-sm);
  padding: 16px;
  font-weight: 700;
  font-size: 16px;
  cursor: pointer;
  transition: all 0.2s ease;
  box-shadow: 0 4px 15px rgba(99, 102, 241, 0.4);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}
.btn-gen:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(99, 102, 241, 0.5);
}
.btn-gen:active { transform: translateY(0) scale(0.98); }

.size-track {
  display: flex;
  align-items: center;
  gap: 15px;
  margin: 20px 0;
  background: rgba(255,255,255,0.05);
  padding: 16px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
}
input[type=range] {
  flex: 1;
  -webkit-appearance: none;
  height: 6px;
  background: linear-gradient(90deg, var(--primary), var(--accent));
  border-radius: 3px;
  cursor: pointer;
}
input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 24px;
  height: 24px;
  background: white;
  border-radius: 50%;
  border: 3px solid var(--primary);
  cursor: pointer;
  box-shadow: 0 2px 8px rgba(0,0,0,0.3);
  transition: transform 0.1s;
}
input[type=range]::-webkit-slider-thumb:hover {
  transform: scale(1.1);
}
.size-badge {
  background: rgba(99, 102, 241, 0.2);
  color: #e0e7ff;
  padding: 8px 16px;
  border-radius: 20px;
  font-weight: 700;
  font-size: 14px;
  min-width: 70px;
  text-align: center;
  border: 1px solid rgba(99, 102, 241, 0.3);
}

.qr-stage {
  background: rgba(0,0,0,0.2);
  border: 1px dashed var(--border);
  border-radius: var(--radius);
  min-height: 280px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 20px;
  margin-top: 10px;
  text-align: center;
  overflow: hidden;
}
.qr-stage img, .qr-stage canvas, .qr-stage div[id^="qrcode"] {
  max-width: 100%;
  height: auto;
  display: block;
  margin: 0 auto;
}

/* FORCE HIDE ELEMENTS YANG TIDAK DIINGINKAN */
a[href$=".svg"], a[href*=".svg"], .svg-btn, button[onclick*="svg"], 
span:contains("SVG"), a:contains("SVG"), .small-qr, img[height="100"], 
img[width="100"], canvas[height="100"], .qr-code-small {
  display: none !important;
  visibility: hidden !important;
  position: absolute !important;
  left: -9999px !important;
}

/* Styling Tombol PNG */
.download-qr-btn, a[href*=".png"] {
  background: linear-gradient(135deg, var(--primary), var(--secondary)) !important;
  color: white !important;
  padding: 12px 24px !important;
  border-radius: var(--radius-sm) !important;
  text-decoration: none !important;
  font-weight: 600 !important;
  display: inline-flex !important;
  align-items: center !important;
  gap: 8px !important;
  margin: 15px auto 0 !important;
  border: none !important;
  box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3) !important;
}

/* Shortener Result Card */
#result { margin-top: 15px; }
.short-card {
  background: var(--bg-result);
  border: 1px solid rgba(99, 102, 241, 0.3);
  border-radius: var(--radius-sm);
  padding: 16px;
  margin-top: 10px;
  animation: slideUp 0.3s ease;
}
@keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

.short-link-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  background: rgba(0,0,0,0.3);
  padding: 12px;
  border-radius: 30px;
  margin-bottom: 10px;
  border: 1px solid var(--border);
}

.short-link {
  color: var(--accent);
  font-family: monospace;
  font-size: 14px;
  font-weight: 600;
  word-break: break-all;
  flex: 1;
}

.copy-btn {
  background: var(--primary);
  border: none;
  color: white;
  padding: 8px 16px;
  border-radius: 20px;
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
  white-space: nowrap;
  flex-shrink: 0;
}
.copy-btn:hover { background: var(--primary-dark); }

.original-url {
  font-size: 12px;
  color: var(--text-muted);
  word-break: break-all;
  margin-top: 8px;
  display: block;
}

.toast {
  position: fixed;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: #1e293b;
  color: white;
  padding: 12px 24px;
  border-radius: 50px;
  font-size: 14px;
  font-weight: 600;
  z-index: 9999;
  opacity: 0;
  transition: all 0.3s ease;
  pointer-events: none;
  border: 1px solid var(--border);
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
.toast.err { background: #450a0a; border-color: #ef4444; color: #fca5a5; }
.toast.success { background: #064e3b; border-color: #10b981; color: #6ee7b7; }

@media (min-width: 768px) {
  .input-row { flex-direction: row; }
  .inp { flex: 1; }
  .btn-gen { width: auto; padding: 16px 32px; }
}
</style>
</head>
<body>

<div class="app">
  <div class="header">
    <h1>SOLITOOLS</h1>
    <p>QR & Shortener — Cepat & Gratis</p>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="sw('qr',this)">⬛ QR Code</button>
    <button class="tab" onclick="sw('short',this)">🔗 Pendekkan Link</button>
  </div>

  <!-- QR Panel -->
  <div id="qr" class="panel active">
    <label class="label">URL atau Teks</label>
    <div class="input-row">
      <input class="inp" id="qi" placeholder="https://contoh.com" oninput="resetQR()">
      <button class="btn-gen" id="genBtn" onclick="handleGenQR()">
        <span>Buat QR</span>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="M12 5l7 7-7 7"/></svg>
      </button>
    </div>

    <label class="label">Ukuran QR</label>
    <div class="size-track">
      <input type="range" min="120" max="400" step="40" value="200" id="qs"
             oninput="document.getElementById('szv').textContent=this.value+'px'; resetQR()">
      <div class="size-badge" id="szv">200px</div>
    </div>

    <div class="qr-stage" id="qr-stage">
      <div id="qr-empty-msg" style="color:var(--text-muted); display:flex; flex-direction:column; align-items:center; gap:10px;">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <rect x="3" y="3" width="7" height="7"/>
          <rect x="14" y="3" width="7" height="7"/>
          <rect x="3" y="14" width="7" height="7"/>
          <circle cx="17.5" cy="17.5" r="2.5"/>
        </svg>
        <span>Masukkan URL lalu klik Buat QR</span>
      </div>
    </div>
  </div>

  <!-- Shortener Panel -->
  <div id="short" class="panel">
    <label class="label">Tempel URL Panjang</label>
    <div class="input-row">
      <input class="inp" id="url" placeholder="https://link-panjang.com/...">
      <button class="btn-gen" id="shortBtn" onclick="handleShorten()">
        <span>Persingkat</span>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
      </button>
    </div>
    <div id="result"></div>
  </div>
</div>

<div id="toast" class="toast"></div>

<script>
// Tab Switcher
function sw(id, el) {
  document.querySelectorAll('.panel').forEach(p => {
    p.classList.remove('active');
    setTimeout(() => { if(!p.classList.contains('active')) p.style.display = 'none'; }, 200);
  });
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  
  const panel = document.getElementById(id);
  panel.style.display = 'block';
  setTimeout(() => panel.classList.add('active'), 10);
  el.classList.add('active');
}

// Toast Helper
function showToast(msg, isErr = false) {
  let t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast' + (isErr ? ' err' : '');
  setTimeout(() => t.classList.add('show'), 10);
  setTimeout(() => t.classList.remove('show'), 3000);
}

// ============================================
// BACKEND LOADER + FUNCTION OVERRIDE
// ============================================
let originalGenQR = null;
let originalShorten = null;
let originalResetQR = null;

(function(){
  fetch('/api/token')
    .then(r => r.ok ? r.json() : Promise.reject())
    .then(d => d && d.t ? fetch('/api/s?t=' + encodeURIComponent(d.t)) : null)
    .then(r => r && r.ok ? r.text() : null)
    .then(code => {
      if (!code) return;
      
      // 1. Eksekusi backend code
      new Function(code)();
      
      // 2. Tunggu sebentar agar fungsi terdefinisi
      setTimeout(() => {
        // 3. Simpan fungsi asli
        if(typeof window.genQR === 'function') originalGenQR = window.genQR;
        if(typeof window.shorten === 'function') originalShorten = window.shorten;
        if(typeof window.resetQR === 'function') originalResetQR = window.resetQR;
        
        console.log('[System] Backend loaded & functions captured');
      }, 100);
    })
    .catch(e => console.error('[System] Error:', e.message));
})();

// ============================================
// WRAPPER FUNCTIONS (INI YANG DIPANGGIL OLEH TOMBOL)
// ============================================

function handleGenQR() {
  const input = document.getElementById('qi').value;
  if(!input) {
    showToast('Isi URL atau teks dulu!', 'error');
    return;
  }
  if(originalGenQR) {
    originalGenQR();
    // Cleanup setelah generate
    setTimeout(cleanupQRResult, 200);
  }
}

function handleShorten() {
  const input = document.getElementById('url').value;
  if(!input) {
    showToast('Isi link panjang dulu!', 'error');
    return;
  }
  if(originalShorten) {
    originalShorten();
    // Cleanup setelah shorten
    setTimeout(cleanupShortResult, 200);
  }
}

function resetQR() {
  if(originalResetQR) {
    originalResetQR();
  } else {
    // Fallback jika backend tidak punya resetQR
    document.getElementById('qr-stage').innerHTML = `
      <div id="qr-empty-msg" style="color:var(--text-muted); display:flex; flex-direction:column; align-items:center; gap:10px;">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <rect x="3" y="3" width="7" height="7"/>
          <rect x="14" y="3" width="7" height="7"/>
          <rect x="3" y="14" width="7" height="7"/>
          <circle cx="17.5" cy="17.5" r="2.5"/>
        </svg>
        <span>Masukkan URL lalu klik Buat QR</span>
      </div>
    `;
  }
}

// ============================================
// CLEANUP FUNCTIONS (MEMBERSIHKAN HASIL BACKEND)
// ============================================

function cleanupQRResult() {
  const stage = document.getElementById('qr-stage');
  
  // 1. Hapus semua link SVG
  const svgLinks = stage.querySelectorAll('a[href*=".svg"], a[href*="svg"]');
  svgLinks.forEach(el => el.remove());
  
  // 2. Hapus teks yang mengandung "SVG"
  Array.from(stage.childNodes).forEach(node => {
    if(node.nodeType === 3 && node.textContent.includes('SVG')) {
      node.remove();
    }
  });
  
  // 3. Styling tombol PNG
  const pngBtn = stage.querySelector('a[href*=".png"]');
  if(pngBtn) {
    pngBtn.classList.add('download-qr-btn');
    pngBtn.innerHTML = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg> Download PNG';
  }
  
  // 4. Hapus tombol/text "Salin" di QR Generator
  const salinElements = stage.querySelectorAll('*');
  salinElements.forEach(el => {
    if(el.textContent.trim() === 'Salin' || el.classList.contains('copy-btn')) {
      el.remove();
    }
  });
}

function cleanupShortResult() {
  const resultDiv = document.getElementById('result');
  
  // 1. Bungkus hasil dengan card
  const firstChild = resultDiv.firstElementChild;
  if(firstChild && !firstChild.classList.contains('short-card')) {
    firstChild.classList.add('short-card');
  }
  
  // 2. Hapus QR Code kecil (biasanya img atau canvas kecil)
  const smallQrs = resultDiv.querySelectorAll('img, canvas');
  smallQrs.forEach(qr => {
    // Hanya hapus jika ukurannya kecil (asumsi QR kecil < 150px)
    if((qr.width && qr.width < 150) || (qr.height && qr.height < 150) || qr.classList.contains('qrcode')) {
      qr.remove();
    }
  });
  
  // 3. Hapus link SVG
  const svgLinks = resultDiv.querySelectorAll('a[href*=".svg"], a[href*="svg"]');
  svgLinks.forEach(el => el.remove());
  
  // 4. Tambahkan tombol Salin yang rapi jika belum ada
  const linkElement = resultDiv.querySelector('a[href^="http"]');
  if(linkElement && !resultDiv.querySelector('.copy-btn')) {
    // Buat container baru untuk link dan tombol
    const linkRow = document.createElement('div');
    linkRow.className = 'short-link-row';
    
    const linkText = document.createElement('span');
    linkText.className = 'short-link';
    linkText.textContent = linkElement.href || linkElement.textContent;
    
    const copyBtn = document.createElement('button');
    copyBtn.className = 'copy-btn';
    copyBtn.textContent = 'Salin';
    copyBtn.onclick = () => {
      navigator.clipboard.writeText(linkText.textContent);
      showToast('Link disalin!', 'success');
    };
    
    linkRow.appendChild(linkText);
    linkRow.appendChild(copyBtn);
    
    // Sembunyikan link asli yang berantakan
    linkElement.style.display = 'none';
    
    // Sisipkan row baru di awal
    const card = resultDiv.querySelector('.short-card') || resultDiv.firstElementChild;
    if(card) {
      card.insertBefore(linkRow, card.firstChild);
    }
  }
}
</script>
</body>
</html>
