<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SOLITOOLS Mobile</title>
<!-- Font -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:opsz,wght@9..40,400;500;600;700&display=swap" rel="stylesheet">

<style>
/* --- 1. VARIABLES & RESET --- */
:root {
  --primary: #6366f1;
  --secondary: #8b5cf6;
  --accent: #06b6d4;
  --bg-dark: #020617;
  --bg-card: rgba(30, 41, 59, 0.85);
  --bg-input: rgba(15, 23, 42, 0.8);
  --border: rgba(255, 255, 255, 0.15);
  --text-main: #f8fafc;
  --text-muted: #cbd5e1;
  --radius-lg: 20px;
  --radius-md: 14px;
  --radius-sm: 10px;
  --shadow: 0 10px 40px -10px rgba(0,0,0,0.5);
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
  font-family: 'DM Sans', sans-serif;
  background-color: var(--bg-dark);
  background-image: 
    radial-gradient(circle at 20% 10%, rgba(99, 102, 241, 0.2) 0%, transparent 50%),
    radial-gradient(circle at 80% 90%, rgba(139, 92, 246, 0.2) 0%, transparent 50%);
  color: var(--text-main);
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: flex-start; /* Align top for mobile scroll */
  padding: 20px 16px 40px;
  line-height: 1.5;
}

/* --- 2. MOBILE CONTAINER --- */
.app-container {
  width: 100%;
  max-width: 480px; /* Batas lebar agar tetap rapi di tablet/desktop */
  background: var(--bg-card);
  backdrop-filter: blur(25px);
  -webkit-backdrop-filter: blur(25px);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 24px 20px;
  box-shadow: var(--shadow);
  position: relative;
  overflow: hidden;
}

/* --- 3. HEADER --- */
.header { text-align: center; margin-bottom: 24px; }
.header h1 {
  font-family: 'Syne', sans-serif;
  font-size: 32px; /* Font besar untuk HP */
  font-weight: 800;
  background: linear-gradient(135deg, #fff 0%, #a5f3fc 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  margin-bottom: 4px;
  letter-spacing: -0.5px;
}
.header p { 
  color: var(--text-muted); 
  font-size: 15px; 
  font-weight: 500;
  opacity: 0.9;
}

/* --- 4. TABS --- */
.tabs {
  display: flex;
  background: rgba(0, 0, 0, 0.4);
  padding: 5px;
  border-radius: var(--radius-md);
  margin-bottom: 24px;
  border: 1px solid var(--border);
}
.tab-btn {
  flex: 1;
  padding: 14px;
  border: none;
  background: transparent;
  color: var(--text-muted);
  font-family: 'DM Sans', sans-serif;
  font-weight: 700;
  font-size: 15px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: all 0.2s ease;
}
.tab-btn.active {
  background: linear-gradient(135deg, var(--primary), var(--secondary));
  color: white;
  box-shadow: 0 4px 12px rgba(99, 102, 241, 0.4);
}

/* --- 5. PANELS & FORMS --- */
.panel { display: none; animation: fadeIn 0.3s ease; }
.panel.active { display: block; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

.label {
  display: block;
  font-size: 13px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.8px;
  color: var(--primary);
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.label::before {
  content: ''; width: 8px; height: 8px;
  background: var(--primary);
  border-radius: 50%;
  box-shadow: 0 0 8px var(--primary);
}

.input-group {
  display: flex;
  flex-direction: column; /* Stack vertikal di HP */
  gap: 12px;
  margin-bottom: 20px;
}

.input-field {
  width: 100%;
  background: var(--bg-input);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  padding: 16px 18px;
  color: var(--text-main);
  font-size: 16px; /* Ukuran aman untuk HP (tidak zoom otomatis) */
  font-family: inherit;
  transition: all 0.2s;
}
.input-field:focus {
  border-color: var(--primary);
  box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.25);
  background: rgba(15, 23, 42, 0.9);
}

.btn-primary {
  width: 100%; /* Full width di HP */
  background: linear-gradient(135deg, var(--primary), var(--secondary));
  color: white;
  border: none;
  border-radius: var(--radius-md);
  padding: 16px;
  font-weight: 700;
  font-size: 16px;
  cursor: pointer;
  transition: transform 0.1s;
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 10px;
  box-shadow: 0 4px 15px rgba(99, 102, 241, 0.4);
}
.btn-primary:active { transform: scale(0.98); }

/* --- 6. SLIDER --- */
.slider-container {
  display: flex;
  align-items: center;
  gap: 15px;
  margin-bottom: 24px;
  background: rgba(255,255,255,0.05);
  padding: 16px;
  border-radius: var(--radius-md);
  border: 1px solid var(--border);
}
input[type=range] {
  flex: 1;
  -webkit-appearance: none;
  background: transparent;
  height: 20px; /* Area sentuh lebih luas */
}
input[type=range]::-webkit-slider-runnable-track {
  width: 100%;
  height: 6px;
  background: linear-gradient(90deg, var(--primary), var(--accent));
  border-radius: 3px;
}
input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none;
  height: 24px;
  width: 24px;
  border-radius: 50%;
  background: #fff;
  margin-top: -9px;
  border: 3px solid var(--primary);
  box-shadow: 0 2px 6px rgba(0,0,0,0.4);
}

.size-badge {
  background: rgba(99, 102, 241, 0.25);
  color: #e0e7ff;
  padding: 8px 16px;
  border-radius: 20px;
  font-size: 14px;
  font-weight: 700;
  min-width: 75px;
  text-align: center;
  border: 1px solid rgba(99, 102, 241, 0.4);
}

/* --- 7. QR STAGE (MOBILE OPTIMIZED) --- */
.qr-stage {
  background: rgba(0, 0, 0, 0.3);
  border: 1px dashed var(--border);
  border-radius: var(--radius-lg);
  min-height: 280px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 20px;
  position: relative;
  overflow: hidden;
}
.qr-stage.has-content {
  background: rgba(255, 255, 255, 0.03);
  border-style: solid;
  border-color: rgba(255, 255, 255, 0.2);
}

.qr-placeholder {
  text-align: center;
  color: var(--text-muted);
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 12px;
}
.qr-placeholder svg { width: 48px; height: 48px; stroke: var(--text-muted); opacity: 0.6; }

#qrcode-wrapper {
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 15px;
  background: #fff;
  border-radius: var(--radius-md);
  box-shadow: 0 8px 25px rgba(0,0,0,0.4);
  margin-bottom: 20px;
  line-height: 0;
  width: 100%;
  max-width: 100%;
  overflow: hidden;
}

#qrcode-wrapper img, 
#qrcode-wrapper canvas {
  max-width: 100%;
  height: auto;
  display: block;
}

.btn-download {
  width: 100%;
  background: rgba(255, 255, 255, 0.1);
  color: var(--text-main);
  border: 1px solid rgba(255, 255, 255, 0.2);
  padding: 14px;
  border-radius: var(--radius-md);
  font-weight: 700;
  font-size: 15px;
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 8px;
  backdrop-filter: blur(5px);
}
.btn-download:hover {
  background: var(--primary);
  border-color: var(--primary);
}

/* --- 8. SHORTENER RESULT --- */
.result-card {
  background: rgba(255,255,255,0.05);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  padding: 16px;
  margin-top: 10px;
  animation: slideUp 0.3s ease;
}
@keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

.short-url-box {
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: rgba(0,0,0,0.4);
  padding: 12px;
  border-radius: 12px;
  border: 1px solid var(--border);
  margin-bottom: 8px;
}
.short-link-text {
  color: var(--accent);
  font-family: monospace;
  font-weight: 600;
  word-break: break-all;
  margin-right: 8px;
  font-size: 14px;
}
.btn-copy {
  background: var(--primary);
  color: white;
  border: none;
  padding: 8px 14px;
  border-radius: 8px;
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
  flex-shrink: 0;
}

/* --- 9. TOAST --- */
.toast {
  position: fixed;
  bottom: 25px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: #1e293b;
  color: white;
  padding: 12px 20px;
  border-radius: 50px;
  font-size: 14px;
  font-weight: 600;
  box-shadow: 0 5px 20px rgba(0,0,0,0.4);
  border: 1px solid rgba(255,255,255,0.1);
  opacity: 0;
  visibility: hidden;
  transition: all 0.3s;
  z-index: 1000;
  width: max-content;
  max-width: 90%;
  text-align: center;
}
.toast.show { opacity: 1; visibility: visible; transform: translateX(-50%) translateY(0); }
.toast.error { border-color: #ef4444; background: #450a0a; color: #fca5a5; }
.toast.success { border-color: #10b981; background: #064e3b; color: #6ee7b7; }

</style>
</head>
<body>

<div class="app-container">
  
  <!-- Header -->
  <div class="header">
    <h1>SOLITOOLS</h1>
    <p>QR & Shortener — Cepat & Gratis</p>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('qr', this)">⬛ QR Code</button>
    <button class="tab-btn" onclick="switchTab('short', this)">🔗 Pendekkan Link</button>
  </div>

  <!-- Panel QR -->
  <div id="panel-qr" class="panel active">
    <label class="label">Masukkan URL / Teks</label>
    <div class="input-group">
      <input type="text" id="qrInput" class="input-field" placeholder="https://contoh.com" autocomplete="off">
      <button class="btn-primary" id="btnGen" onclick="handleGenQR()">
        <span>Buat QR Code</span>
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="M12 5l7 7-7 7"/></svg>
      </button>
    </div>

    <label class="label">Ukuran QR</label>
    <div class="slider-container">
      <input type="range" id="qrSize" min="120" max="400" step="40" value="200" oninput="updateSizeLabel(this.value)">
      <div class="size-badge" id="sizeLabel">200px</div>
    </div>

    <div class="qr-stage" id="qrStage">
      <div class="qr-placeholder" id="qrPlaceholder">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="7" height="7"></rect>
          <rect x="14" y="3" width="7" height="7"></rect>
          <rect x="14" y="14" width="7" height="7"></rect>
          <path d="M3 14h7v7H3z"></path>
        </svg>
        <span>Klik tombol di atas untuk membuat QR</span>
      </div>
      
      <div id="qrcode-wrapper" style="display:none;"></div>
      
      <button id="btnDownload" class="btn-download" style="display:none;" onclick="downloadQR()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Download Gambar
      </button>
    </div>
  </div>

  <!-- Panel Shortener -->
  <div id="panel-short" class="panel">
    <label class="label">Tempel Link Panjang</label>
    <div class="input-group">
      <input type="text" id="urlInput" class="input-field" placeholder="https://link-panjang.com/..." autocomplete="off">
      <button class="btn-primary" id="btnShort" onclick="handleShorten()">
        <span>Pendekkan Sekarang</span>
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
      </button>
    </div>
    <div id="shortResult"></div>
  </div>

</div>

<!-- Toast -->
<div id="toast" class="toast"></div>

<script>
/**
 * LOGIKA UI MOBILE
 */

function switchTab(tabName, btn) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(`panel-${tabName}`).classList.add('active');
  btn.classList.add('active');
}

function updateSizeLabel(val) {
  document.getElementById('sizeLabel').textContent = val + 'px';
  const qrWrapper = document.getElementById('qrcode-wrapper');
  const qrImg = qrWrapper.querySelector('img');
  if(qrImg) {
    qrImg.style.width = val + 'px';
    qrImg.style.height = val + 'px';
  }
}

function showToast(msg, type = 'success') {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.className = `toast show ${type}`;
  setTimeout(() => toast.classList.remove('show'), 3000);
}

function downloadQR() {
  const wrapper = document.getElementById('qrcode-wrapper');
  const img = wrapper.querySelector('img');
  if (!img) return;
  const link = document.createElement('a');
  link.download = `qr-solitools-${Date.now()}.png`;
  link.href = img.src;
  link.click();
  showToast('Gambar berhasil disimpan!', 'success');
}

// Wrapper Functions
let originalGenQR = null;
let originalShorten = null;
let originalResetQR = null;

function handleGenQR() {
  const input = document.getElementById('qrInput').value;
  if(!input) {
    showToast('Isi URL atau teks dulu ya!', 'error');
    document.getElementById('qrInput').focus();
    return;
  }
  if(originalGenQR) originalGenQR();
  else showToast('Memuat sistem...', 'success');
}

function handleShorten() {
  const input = document.getElementById('urlInput').value;
  if(!input) {
    showToast('Isi link panjang dulu!', 'error');
    document.getElementById('urlInput').focus();
    return;
  }
  if(originalShorten) originalShorten();
  else showToast('Memuat sistem...', 'success');
}

window.resetQR = function() {
  document.getElementById('qrPlaceholder').style.display = 'flex';
  document.getElementById('qrcode-wrapper').style.display = 'none';
  document.getElementById('btnDownload').style.display = 'none';
  document.getElementById('qrStage').classList.remove('has-content');
  if(originalResetQR) originalResetQR();
};

// Observer untuk menangkap hasil backend
const qrStage = document.getElementById('qrStage');
const qrWrapper = document.getElementById('qrcode-wrapper');
const qrPlaceholder = document.getElementById('qrPlaceholder');
const btnDownload = document.getElementById('btnDownload');

const qrObserver = new MutationObserver((mutations) => {
  mutations.forEach((mutation) => {
    mutation.addedNodes.forEach((node) => {
      if ((node.tagName === 'IMG' || node.tagName === 'CANVAS') && node.parentNode === qrStage) {
        qrWrapper.innerHTML = ''; 
        qrWrapper.appendChild(node);
        
        const size = document.getElementById('qrSize').value;
        node.style.width = size + 'px';
        node.style.height = size + 'px';
        node.style.maxWidth = '100%';
        node.style.height = 'auto';

        qrPlaceholder.style.display = 'none';
        qrWrapper.style.display = 'flex';
        btnDownload.style.display = 'flex';
        qrStage.classList.add('has-content');
        
        showToast('QR Code siap!', 'success');
      }
    });
  });
});

qrObserver.observe(qrStage, { childList: true, subtree: true });

/**
 * BACKEND LOADER (TIDAK DIUBAH)
 */
(function(){
  function showErr(msg) {
    console.error('[QRTools]', msg);
    showToast(msg, 'error');
  }

  fetch('/api/token')
    .then(function(r) {
      if (!r.ok) { showErr('Gagal koneksi server (' + r.status + ').'); return null; }
      return r.json();
    })
    .then(function(d) {
      if (!d || !d.t) return null;
      return fetch('/api/s?t=' + encodeURIComponent(d.t));
    })
    .then(function(r) {
      if (!r) return null;
      if (!r.ok) { showErr('Gagal ambil script (' + r.status + ').'); return null; }
      return r.text();
    })
    .then(function(code) {
      if (!code) return;
      try {
        (new Function(code))();
        setTimeout(() => {
          if(typeof window.genQR === 'function') originalGenQR = window.genQR;
          if(typeof window.shorten === 'function') originalShorten = window.shorten;
          if(typeof window.resetQR === 'function') originalResetQR = window.resetQR;
        }, 100);
      } catch(e) {
        showErr('Error script: ' + e.message);
      }
    })
    .catch(function(e) {
      showErr('Koneksi error.');
    });
})();
</script>
</body>
  </html>
