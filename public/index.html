<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SOLITOOLS</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@400;500;600&display=swap');

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  background: linear-gradient(145deg, #0b0a1a, #060614);
  font-family: 'DM Sans', sans-serif;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 2rem 1.25rem;
}

.app {
  background: rgba(10, 12, 28, 0.7);
  backdrop-filter: blur(2px);
  border-radius: 28px;
  padding: 2rem;
  width: 100%;
  max-width: 720px;
  border: 1px solid rgba(255, 255, 255, 0.08);
  box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
}

.header {
  text-align: center;
  margin-bottom: 1.8rem;
}

.header h1 {
  font-family: 'Syne', sans-serif;
  font-size: 2rem;
  font-weight: 800;
  background: linear-gradient(135deg, #c7d2fe, #a5f3fc);
  -webkit-background-clip: text;
  background-clip: text;
  -webkit-text-fill-color: transparent;
}

.header p {
  font-size: 0.85rem;
  color: #94a3b8;
  margin-top: 0.2rem;
}

.tabs {
  display: flex;
  gap: 8px;
  background: rgba(255, 255, 255, 0.03);
  padding: 6px;
  border-radius: 60px;
  margin-bottom: 2rem;
  border: 1px solid rgba(255, 255, 255, 0.08);
}

.tab {
  flex: 1;
  padding: 10px 16px;
  border: none;
  border-radius: 40px;
  background: transparent;
  font-size: 0.85rem;
  font-weight: 600;
  font-family: 'Syne', sans-serif;
  color: #94a3b8;
  cursor: pointer;
  transition: 0.2s;
}

.tab.active {
  background: linear-gradient(135deg, #6366f1, #8b5cf6);
  color: white;
  box-shadow: 0 4px 10px rgba(99, 102, 241, 0.3);
}

.tab:hover:not(.active) {
  background: rgba(255, 255, 255, 0.07);
  color: #f1f5f9;
}

.field-label {
  font-size: 0.7rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: #a5b4fc;
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 6px;
}

.field-label::before {
  content: '';
  width: 6px;
  height: 6px;
  background: linear-gradient(135deg, #6366f1, #06b6d4);
  border-radius: 2px;
}

.input-row {
  display: flex;
  gap: 12px;
  margin-bottom: 20px;
}

.inp {
  flex: 1;
  padding: 12px 16px;
  background: rgba(255, 255, 255, 0.04);
  border: 1px solid rgba(255, 255, 255, 0.1);
  border-radius: 14px;
  color: #f1f5f9;
  font-size: 0.9rem;
  outline: none;
}

.inp:focus {
  border-color: #6366f1;
  background: rgba(99, 102, 241, 0.1);
}

.btn-gen {
  padding: 0 24px;
  border: none;
  border-radius: 14px;
  background: linear-gradient(135deg, #6366f1, #8b5cf6);
  color: white;
  font-size: 0.85rem;
  font-weight: 700;
  font-family: 'Syne', sans-serif;
  cursor: pointer;
  white-space: nowrap;
}

.btn-gen:hover {
  transform: translateY(-1px);
  box-shadow: 0 6px 14px rgba(99, 102, 241, 0.4);
}

.size-track {
  display: flex;
  align-items: center;
  gap: 16px;
  margin: 20px 0 24px;
}

.size-track input {
  flex: 1;
  height: 4px;
  -webkit-appearance: none;
  background: linear-gradient(90deg, #6366f1, #06b6d4);
  border-radius: 4px;
}

.size-track input::-webkit-slider-thumb {
  width: 18px;
  height: 18px;
  background: white;
  border-radius: 50%;
  box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.4);
  cursor: pointer;
  -webkit-appearance: none;
}

.size-badge {
  font-size: 0.8rem;
  font-weight: 600;
  background: rgba(255, 255, 255, 0.07);
  border: 1px solid rgba(255, 255, 255, 0.1);
  padding: 5px 12px;
  border-radius: 40px;
  min-width: 65px;
  text-align: center;
  font-family: 'Syne', sans-serif;
  color: #f1f5f9;
}

.qr-stage {
  border: 1px solid rgba(255, 255, 255, 0.1);
  border-radius: 24px;
  background: rgba(255, 255, 255, 0.03);
  padding: 1.8rem;
  text-align: center;
  min-height: 380px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 1rem;
}

.qr-empty {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 12px;
  color: #94a3b8;
}

.qr-empty svg {
  opacity: 0.6;
}

.qr-stage img {
  max-width: 100%;
  height: auto;
  border-radius: 16px;
  background: white;
  padding: 12px;
  box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
}

.download-qr-btn {
  background: rgba(255, 255, 255, 0.07);
  border: 1px solid rgba(255, 255, 255, 0.15);
  border-radius: 40px;
  padding: 8px 20px;
  color: #f1f5f9;
  font-size: 0.8rem;
  font-weight: 600;
  cursor: pointer;
  transition: 0.2s;
}

.download-qr-btn:hover {
  background: rgba(99, 102, 241, 0.3);
  border-color: #6366f1;
}

#result {
  margin-top: 1.5rem;
}

.short-card {
  background: rgba(255, 255, 255, 0.04);
  border: 1px solid rgba(255, 255, 255, 0.1);
  border-radius: 14px;
  padding: 1rem;
}

.short-link-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  background: rgba(0, 0, 0, 0.3);
  border-radius: 40px;
  padding: 6px 6px 6px 16px;
}

.short-link {
  font-family: monospace;
  font-size: 0.8rem;
  color: #a5f3fc;
  word-break: break-all;
}

.copy-btn {
  background: #6366f1;
  border: none;
  border-radius: 30px;
  padding: 6px 14px;
  color: white;
  font-weight: 600;
  font-size: 0.7rem;
  cursor: pointer;
}

.copy-btn:hover {
  background: #8b5cf6;
}

.original-url {
  font-size: 0.7rem;
  color: #94a3b8;
  margin-top: 10px;
  word-break: break-all;
}

.toast {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: #1f2937;
  color: white;
  padding: 8px 20px;
  border-radius: 40px;
  font-size: 0.8rem;
  z-index: 9999;
  opacity: 0;
  transition: 0.2s;
  pointer-events: none;
}

.toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

.toast.err {
  background: #7f1a1a;
}

@media (max-width: 640px) {
  .app {
    padding: 1.5rem;
  }
  .input-row {
    flex-direction: column;
  }
  .btn-gen {
    padding: 12px;
    justify-content: center;
  }
  .short-link-row {
    flex-direction: column;
    border-radius: 14px;
    padding: 12px;
  }
}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>SOLITOOLS</h1>
    <p>QR code & persingkat tautan — gratis, cepat, instan</p>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="sw('qr',this)"><span>⬛ QR Generator</span></button>
    <button class="tab" onclick="sw('short',this)"><span>🔗 Persingkat Tautan</span></button>
  </div>

  <div id="qr" class="panel active">
    <div class="field-label">URL atau Teks</div>
    <div class="input-row">
      <input class="inp" id="qi" placeholder="https://contoh.com" oninput="resetQR&&resetQR()">
      <button class="btn-gen" id="genBtn" onclick="genQR&&genQR()">Buat QR ↗</button>
    </div>
    <div class="field-label">Ukuran QR</div>
    <div class="size-track">
      <input type="range" min="120" max="400" step="40" value="200" id="qs"
             oninput="document.getElementById('szv').textContent=this.value+'px';resetQR&&resetQR()">
      <div class="size-badge" id="szv">200px</div>
    </div>
    <div class="qr-stage" id="qr-stage">
      <div class="qr-empty">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2">
          <rect x="3" y="3" width="7" height="7" rx="1.5" />
          <rect x="14" y="3" width="7" height="7" rx="1.5" />
          <rect x="3" y="14" width="7" height="7" rx="1.5" />
          <circle cx="17.5" cy="17.5" r="2.5" stroke="currentColor" fill="none" />
        </svg>
        <span>Masukkan URL lalu klik Buat QR</span>
      </div>
    </div>
  </div>

  <div id="short" class="panel">
    <div class="field-label">Tempel URL Panjang</div>
    <div class="input-row">
      <input class="inp" id="url" placeholder="https://tautan-sangat-panjang.com/path/...">
      <button class="btn-gen" id="shortBtn" onclick="shorten&&shorten()">Persingkat ↗</button>
    </div>
    <div id="result"></div>
  </div>
</div>

<script>
// TAB SWITCHER (asli)
function sw(id, el) {
  document.querySelectorAll('.panel').forEach(p => {
    p.classList.remove('active');
    setTimeout(() => { if (!p.classList.contains('active')) p.style.display = 'none'; }, 300);
  });
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  var panel = document.getElementById(id);
  panel.style.display = 'block';
  setTimeout(() => panel.classList.add('active'), 10);
  el.classList.add('active');
}

// Fungsi download QR (ringan, tanpa observer)
function attachDownload() {
  let stage = document.getElementById('qr-stage');
  let img = stage.querySelector('img');
  let existingBtn = stage.querySelector('.download-qr-btn');
  if (img && !existingBtn) {
    let btn = document.createElement('button');
    btn.className = 'download-qr-btn';
    btn.textContent = '⬇️ Download QR (PNG)';
    btn.onclick = () => {
      let link = document.createElement('a');
      link.download = 'soliquad.png';
      link.href = img.src;
      link.click();
      showToast('QR diunduh');
    };
    stage.appendChild(btn);
  } else if (!img && existingBtn) existingBtn.remove();
}

// Override genQR agar tetap jalan dan attach download
let originalGen = window.genQR;
if (originalGen) {
  window.genQR = function() {
    originalGen();
    setTimeout(attachDownload, 100);
  };
}

// Override resetQR
let originalReset = window.resetQR;
if (originalReset) {
  window.resetQR = function() {
    originalReset();
    let btn = document.querySelector('#qr-stage .download-qr-btn');
    if (btn) btn.remove();
  };
}

// Toast sederhana
function showToast(msg, isErr = false) {
  let t = document.querySelector('.toast');
  if (t) t.remove();
  let div = document.createElement('div');
  div.className = 'toast' + (isErr ? ' err' : '');
  div.textContent = msg;
  document.body.appendChild(div);
  setTimeout(() => div.classList.add('show'), 10);
  setTimeout(() => div.classList.remove('show'), 2500);
  setTimeout(() => div.remove(), 2800);
}

// Handle copy untuk shortener (asli mungkin sudah ada, tapi kita pastikan)
function handleShortenCopy() {
  let resultDiv = document.getElementById('result');
  if (!resultDiv) return;
  let observer = new MutationObserver(() => {
    let btn = resultDiv.querySelector('.copy-btn');
    if (btn && !btn._copyFixed) {
      btn._copyFixed = true;
      let originalClick = btn.onclick;
      btn.onclick = (e) => {
        if (originalClick) originalClick(e);
        let linkSpan = resultDiv.querySelector('.short-link');
        if (linkSpan) navigator.clipboard.writeText(linkSpan.innerText);
        showToast('Tautan disalin');
      };
    }
  });
  observer.observe(resultDiv, { childList: true, subtree: true });
}
handleShortenCopy();

// LOAD BACKEND SCRIPT (tetap sama)
(function(){
  function err(msg) {
    let t = document.createElement('div');
    t.className = 'toast err';
    t.textContent = msg;
    document.body.appendChild(t);
    setTimeout(() => t.classList.add('show'), 10);
    setTimeout(() => t.classList.remove('show'), 4000);
  }
  fetch('/api/token')
    .then(r => r.ok ? r.json() : Promise.reject())
    .then(d => d && d.t ? fetch('/api/s?t=' + encodeURIComponent(d.t)) : null)
    .then(r => r && r.ok ? r.text() : null)
    .then(code => { if (code) new Function(code)(); })
    .catch(() => err('Gagal muat modul. Cek koneksi.'));
})();
</script>
</body>
</html>
