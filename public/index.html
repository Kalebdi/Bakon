<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR & Link Tools</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --g1:#6366f1;--g2:#8b5cf6;--g3:#06b6d4;
  --card:rgba(255,255,255,0.04);--card2:rgba(255,255,255,0.08);--card3:rgba(255,255,255,0.12);
  --bdr:rgba(255,255,255,0.08);--bdr2:rgba(255,255,255,0.16);--bdr3:rgba(255,255,255,0.24);
  --txt:#f8fafc;--txt2:#94a3b8;--txt3:#64748b;--txt4:#475569;
  --r:16px;--r2:10px;
}

/* ── BASE ────────────────────────────────────────────────── */
body{font-family:'DM Sans',Arial,sans-serif;background:#080614;min-height:100vh;display:flex;justify-content:center;align-items:flex-start;padding:20px 12px 60px}
.app{background:linear-gradient(135deg,#0a0718 0%,#110926 35%,#0d1221 100%);border-radius:var(--r);padding:1.5rem;width:100%;max-width:520px;min-height:520px;position:relative;overflow:hidden;box-shadow:0 8px 40px rgba(0,0,0,0.6)}
/* ... gradient effects sama seperti sebelumnya ... */
.app::before{content:'';position:absolute;top:-100px;right:-100px;width:300px;height:300px;background:radial-gradient(circle,rgba(99,102,241,0.2) 0%,transparent 70%);pointer-events:none;filter:blur(40px);animation:float 8s ease-in-out infinite}
.app::after{content:'';position:absolute;bottom:-80px;left:-80px;width:240px;height:240px;background:radial-gradient(circle,rgba(6,182,212,0.15) 0%,transparent 70%);pointer-events:none;filter:blur(40px);animation:float 10s ease-in-out infinite reverse}
@keyframes float{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(20px,-20px) scale(1.05)}}

/* ── HEADER & TABS (sama) ─────────────────────────────────── */
.header{margin-bottom:1.75rem;position:relative;z-index:2}
.header h1{font-family:'Syne',sans-serif;font-size:26px;font-weight:800;background:linear-gradient(135deg,#c7d2fe 0%,#a5f3fc 50%,#c7d2fe 100%);background-size:200% auto;-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:-0.5px;animation:shimmer 4s linear infinite}
@keyframes shimmer{0%{background-position:0% center}100%{background-position:200% center}}
.header p{font-size:14px;color:var(--txt2);margin-top:6px;font-weight:400}
.tabs{display:flex;gap:6px;margin-bottom:1.75rem;background:var(--card);padding:5px;border-radius:var(--r);border:0.5px solid var(--bdr);position:relative;z-index:2}
.tab{flex:1;padding:11px 16px;border:none;border-radius:var(--r2);background:transparent;cursor:pointer;font-size:13px;font-weight:600;color:var(--txt2);transition:all 0.25s cubic-bezier(0.4,0,0.2,1);font-family:'DM Sans',sans-serif;position:relative;overflow:hidden}
.tab::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,var(--g1),var(--g2));opacity:0;transition:opacity 0.25s;border-radius:var(--r2)}
.tab span{position:relative;z-index:1}
.tab.active{color:#fff;box-shadow:0 2px 16px rgba(99,102,241,0.35)}
.tab.active::before{opacity:1}
.tab:hover:not(.active){color:var(--txt);background:var(--card2)}
.panel{display:none;opacity:0;transform:translateY(10px);transition:opacity 0.3s ease,transform 0.3s ease;position:relative;z-index:2}
.panel.active{display:block;opacity:1;transform:translateY(0)}

/* ── FORM ELEMENTS (sama) ─────────────────────────────────── */
.field-label{font-size:11px;font-weight:700;color:var(--txt2);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px;font-family:'Syne',sans-serif;display:flex;align-items:center;gap:6px}
.field-label::before{content:'';width:8px;height:8px;background:linear-gradient(135deg,var(--g1),var(--g3));border-radius:2px;flex-shrink:0}
.input-row{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.inp{flex:1;padding:13px 16px;border:1px solid var(--bdr2);border-radius:var(--r2);background:var(--card2);color:var(--txt);font-size:16px;font-family:'DM Sans',sans-serif;outline:none;transition:all 0.2s ease;min-width:0}
.inp:focus{border-color:var(--g1);background:var(--card3);box-shadow:0 0 0 4px rgba(99,102,241,0.12)}
.inp::placeholder{color:var(--txt4)}
.btn-gen{padding:13px 22px;border:none;border-radius:var(--r2);background:linear-gradient(135deg,var(--g1),var(--g2));color:#fff;font-size:13px;font-weight:700;cursor:pointer;font-family:'Syne',sans-serif;letter-spacing:0.3px;transition:all 0.2s cubic-bezier(0.4,0,0.2,1);white-space:nowrap;box-shadow:0 4px 16px rgba(99,102,241,0.35);flex-shrink:0}
.btn-gen:hover{transform:translateY(-2px);box-shadow:0 6px 24px rgba(99,102,241,0.45)}
.btn-gen:disabled{opacity:0.5;cursor:not-allowed;transform:none}

/* ── MOBILE RESPONSIVE - FIX MENTOK ───────────────────────── */
@media (max-width: 768px) {
  body { padding: 12px 8px 40px !important; }
  .app { 
    padding: 20px 16px !important; 
    max-width: 100% !important; 
    margin: 0 !important;
    border-radius: 12px !important;
  }
  
  .header h1 { font-size: 22px !important; }
  .header p { font-size: 13px !important; }
  
  /* Input row STACK vertikal */
  .input-row { 
    flex-direction: column !important; 
    gap: 12px !important;
  }
  .inp { 
    font-size: 16px !important; /* Prevent zoom */
    padding: 16px !important;
  }
  .btn-gen { 
    width: 100% !important; 
    padding: 16px !important;
    font-size: 14px !important;
  }
  
  /* QR Result MOBILE */
  .qr-result { 
    flex-direction: column !important; 
    gap: 20px !important;
    padding: 20px 16px !important;
  }
  
  .qr-img-col { 
    width: 100% !important; 
    padding: 20px 16px !important;
    background: none !important;
    border: none !important;
    text-align: center !important;
  }
  
  .qr-img-col img { 
    max-width: 90vw !important; 
    max-height: 280px !important;
    width: auto !important;
    height: auto !important;
  }
  
  .qr-info-col { 
    width: 100% !important; 
    padding: 0 !important;
  }
  
  .size-track { 
    padding: 0 8px !important;
  }
  
  /* Buttons */
  .btn-sm { 
    flex: 1 !important; 
    min-width: 100px !important;
    padding: 12px !important;
    font-size: 13px !important;
    justify-content: center;
  }
}

/* ── DESKTOP ──────────────────────────────────────────────── */
@media (min-width: 769px) {
  body { padding: 40px 16px 60px !important; }
  .app { padding: 2.5rem !important; max-width: 600px !important; }
  .qr-result { display: flex !important; gap: 24px !important; }
  .qr-img-col { flex: 0 0 300px !important; padding: 2rem !important; }
}

/* ── QR RESULT STYLES ─────────────────────────────────────── */
/* ── QR STAGE & RESULT (400px MAX) ───────────────────────── */
.qr-stage{
  border:1px solid var(--bdr);
  border-radius:var(--r);
  overflow:hidden;
  background:var(--card);
  transition:all 0.3s ease;
  display:flex !important;
  align-items:center !important;
  justify-content:center !important;
  min-height:420px !important;
}

.qr-img-col{
  padding:2rem;
  display:flex !important;
  flex-direction:column !important;
  align-items:center !important;
  justify-content:center !important;
  background:linear-gradient(135deg,rgba(99,102,241,0.08),rgba(6,182,212,0.06));
  border-right:1px solid var(--bdr);
  min-height:420px !important;
  flex:0 0 400px !important;
}

.qr-img-col img{
  display:block !important;
  margin:0 auto !important;
  max-width:400px !important;
  max-height:400px !important;
  width:auto !important;
  height:auto !important;
  object-fit:contain !important;
  border-radius:var(--r2);
  border:8px solid rgba(255,255,255,0.15) !important;
  box-shadow:0 20px 40px rgba(0,0,0,0.4) !important;
  transition:transform 0.3s ease, box-shadow 0.3s ease;
  image-rendering:-webkit-optimize-contrast;
  image-rendering:crisp-edges;
}

.qr-img-col img:hover{
  transform:scale(1.02) !important;
  box-shadow:0 25px 50px rgba(0,0,0,0.5) !important;
}

/* SLIDER MAX 400px */
.size-track input[type="range"]{
  flex:1;
  -webkit-appearance:none;
  height:5px;
  background:linear-gradient(90deg,var(--g1),var(--g3));
  border-radius:3px;
  outline:none;
  cursor:pointer;
}

/* MOBILE 400px */
@media(max-width:600px){
  .qr-img-col{
    border-right:none !important;
    border-bottom:1px solid var(--bdr) !important;
    padding:24px 12px !important;
    flex:none !important;
    min-height:420px !important;
  }
  .qr-img-col img{
    max-width:95vw !important;
    max-height:400px !important;
    border:6px solid rgba(255,255,255,0.2) !important;
  }
}
/* ── LAINNYA (toast, spin, dll - sama seperti sebelumnya) ── */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:linear-gradient(135deg,var(--g1),var(--g2));color:#fff;padding:12px 24px;border-radius:24px;font-size:13px;font-weight:500;z-index:9999;box-shadow:0 8px 32px rgba(99,102,241,0.4);opacity:0;transition:all 0.3s;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.err{background:linear-gradient(135deg,#dc2626,#b91c1c)}
.spin{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:spin 0.7s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}
             </style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>QR & Link Tools</h1>
    <p>Buat QR code &amp; persingkat tautan — gratis, cepat, instan</p>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="sw('qr',this)"><span>⬛ QR Generator</span></button>
    <button class="tab" onclick="sw('short',this)"><span>🔗 Persingkat Tautan</span></button>
  </div>

  <div id="qr" class="panel active">
    <div class="field-label">URL atau Teks</div>
    <div class="input-row">
      <input class="inp" id="qi" placeholder="https://contoh.com" oninput="resetQR&&resetQR()"/>
      <button class="btn-gen" id="genBtn" onclick="genQR&&genQR()">Buat QR ↗</button>
    </div>
    <div class="field-label">Ukuran QR</div>
    <div class="size-track">
      <input type="range" min="120" max="400" step="40" value="200" id="qs"
             oninput="document.getElementById('szv').textContent=this.value+'px';resetQR&&resetQR()"/>
      <div class="size-badge" id="szv">200px</div>
    </div>
    <div class="qr-stage" id="qr-stage">
      <div class="qr-empty">
        <div class="ico">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="rgba(148,163,184,0.5)" stroke-width="1.5">
            <rect x="3" y="3" width="7" height="7" rx="1.5"/>
            <rect x="14" y="3" width="7" height="7" rx="1.5"/>
            <rect x="3" y="14" width="7" height="7" rx="1.5"/>
            <circle cx="17.5" cy="17.5" r="2.5" fill="rgba(148,163,184,0.3)" stroke="none"/>
          </svg>
        </div>
        <span>Masukkan URL lalu klik Buat QR</span>
      </div>
    </div>
  </div>

  <div id="short" class="panel">
    <div class="field-label">Tempel URL Panjang</div>
    <div class="input-row">
      <input class="inp" id="url" placeholder="https://tautan-sangat-panjang.com/path/..."/>
      <button class="btn-gen" id="shortBtn" onclick="shorten&&shorten()">Persingkat ↗</button>
    </div>
    <div id="result"></div>
  </div>
</div>

<script>
// ── TAB SWITCHER — taruh di sini karena dipanggil langsung saat klik ──
// Tidak sensitif, tidak perlu disembunyikan
function sw(id, el) {
  document.querySelectorAll('.panel').forEach(function(p) {
    p.classList.remove('active');
    setTimeout(function() {
      if (!p.classList.contains('active')) p.style.display = 'none';
    }, 300);
  });
  document.querySelectorAll('.tab').forEach(function(t) { t.classList.remove('active'); });
  var panel = document.getElementById(id);
  panel.style.display = 'block';
  setTimeout(function() { panel.classList.add('active'); }, 10);
  el.classList.add('active');
}

// ── LOAD LOGIC DARI API ─────────────────────────────────────
// genQR, shorten, cp, resetQR dimuat dari /api/s via HMAC token
(function(){
  function showErr(msg) {
    console.error('[QRTools]', msg);
    var t = document.createElement('div');
    t.className = 'toast err';
    t.textContent = msg;
    document.body.appendChild(t);
    requestAnimationFrame(function(){
      setTimeout(function(){ t.classList.add('show'); }, 10);
      setTimeout(function(){ t.classList.remove('show'); setTimeout(function(){ t.remove(); }, 300); }, 5000);
    });
  }

  // Step 1: ambil token
  fetch('/api/token')
    .then(function(r) {
      if (!r.ok) { showErr('Gagal ambil token (' + r.status + '). Cek APP_SECRET di Vercel.'); return null; }
      return r.json();
    })
    .then(function(d) {
      if (!d || !d.t) return null;
      // Step 2: ambil script pakai token
      return fetch('/api/s?t=' + encodeURIComponent(d.t));
    })
    .then(function(r) {
      if (!r) return null;
      if (!r.ok) { showErr('Gagal ambil script (' + r.status + ').'); return null; }
      return r.text();
    })
    .then(function(code) {
      if (!code) return;
      try {
        (new Function(code))();
        console.log('[QRTools] Script berhasil dimuat. genQR:', typeof window.genQR, '| shorten:', typeof window.shorten);
      } catch(e) {
        showErr('Error saat jalankan script: ' + e.message);
        console.error('[QRTools] Script error:', e);
      }
    })
    .catch(function(e) {
      showErr('Fetch error: ' + e.message);
    });
})();
</script>
</body>
</html>
