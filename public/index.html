<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SOLITOOLS</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap');

/* 🎨 CSS Variables */
:root{
  --g1:#6366f1; --g2:#8b5cf6; --g3:#06b6d4;
  --card:rgba(255,255,255,0.04); --card2:rgba(255,255,255,0.08);
  --bdr:rgba(255,255,255,0.08); --bdr2:rgba(255,255,255,0.16);
  --txt:#f8fafc; --txt2:#94a3b8; --txt3:#64748b;
  --r:20px; --r2:14px;
}

/* 🧹 Reset */
*{box-sizing:border-box;margin:0;padding:0}

body{
  font-family:'DM Sans',system-ui,sans-serif;
  background:#080614;
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:32px 16px 64px;
  color:var(--txt);
}

/* 📦 App Container */
.app{
  background:linear-gradient(135deg,#0a0718 0%,#110926 35%,#0d1221 100%);
  border-radius:var(--r);
  padding:2rem;
  width:100%;
  max-width:700px;
  position:relative;
  overflow:hidden;
  box-shadow:0 20px 60px rgba(0,0,0,0.6);
  border:1px solid var(--bdr);
}

/* 🌫️ Background Blobs (ringan) */
.app::before,.app::after{
  content:''; position:absolute; border-radius:50%;
  filter:blur(40px); opacity:0.5; pointer-events:none; z-index:0;
}
.app::before{
  top:-80px; right:-80px; width:280px; height:280px;
  background:radial-gradient(circle,rgba(99,102,241,0.25),transparent 70%);
  animation:float 8s ease-in-out infinite;
}
.app::after{
  bottom:-60px; left:-60px; width:220px; height:220px;
  background:radial-gradient(circle,rgba(6,182,212,0.2),transparent 70%);
  animation:float 10s ease-in-out infinite reverse;
}
@keyframes float{0%,100%{transform:translate(0,0)}50%{transform:translate(15px,-15px)}}

/* 🏷️ Header */
.header{margin-bottom:1.75rem; position:relative; z-index:1; text-align:center}
.header h1{
  font-family:'Syne',sans-serif; font-size:28px; font-weight:800;
  background:linear-gradient(135deg,#c7d2fe,#a5f3fc);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
  margin-bottom:6px;
}
.header p{font-size:14px; color:var(--txt2)}

/* 🔘 Tabs */
.tabs{
  display:flex; gap:6px; margin-bottom:1.5rem;
  background:var(--card2); padding:6px; border-radius:var(--r);
  border:1px solid var(--bdr2); position:relative; z-index:1;
}
.tab{
  flex:1; padding:12px 16px; border:none; border-radius:var(--r2);
  background:transparent; cursor:pointer; font-size:14px; font-weight:600;
  color:var(--txt2); transition:all 0.2s ease; position:relative; overflow:hidden;
}
.tab::before{
  content:''; position:absolute; inset:0;
  background:linear-gradient(135deg,var(--g1),var(--g2));
  opacity:0; transition:opacity 0.2s; border-radius:var(--r2);
}
.tab.active{color:#fff; box-shadow:0 4px 16px rgba(99,102,241,0.35)}
.tab.active::before{opacity:1}
.tab:hover:not(.active){color:var(--txt); background:var(--card)}

/* 📝 Form Elements */
.field-label{
  font-size:12px; font-weight:700; color:var(--txt2);
  text-transform:uppercase; letter-spacing:1px;
  margin:1rem 0 0.5rem; display:flex; align-items:center; gap:6px;
}
.field-label::before{
  content:''; width:8px; height:8px;
  background:linear-gradient(135deg,var(--g1),var(--g3));
  border-radius:2px; flex-shrink:0;
}
.input-row{display:flex; gap:10px; margin-bottom:1rem; align-items:flex-end}
.inp{
  flex:1; padding:14px 16px; border:1px solid var(--bdr2);
  border-radius:var(--r2); background:var(--card2); color:var(--txt);
  font-size:15px; outline:none; transition:all 0.2s ease; min-height:48px;
}
.inp:focus{border-color:var(--g1); background:var(--card); box-shadow:0 0 0 3px rgba(99,102,241,0.15)}
.inp::placeholder{color:var(--txt3)}
.btn-gen{
  padding:14px 22px; border:none; border-radius:var(--r2);
  background:linear-gradient(135deg,var(--g1),var(--g2)); color:#fff;
  font-size:14px; font-weight:700; cursor:pointer; white-space:nowrap;
  transition:all 0.2s ease; min-height:48px; flex-shrink:0;
}
.btn-gen:hover{transform:translateY(-2px); box-shadow:0 8px 24px rgba(99,102,241,0.4)}

/* 🖼️ QR Stage - CENTERED & 400px READY */
.qr-stage{
  border:1px solid var(--bdr2); border-radius:var(--r);
  background:var(--card); min-height:420px; margin-top:1rem;
  display:flex !important; align-items:center !important; justify-content:center !important;
  padding:1.5rem; position:relative; z-index:1;
}
.qr-stage > * { position:relative; z-index:2 }

/* Placeholder state */
.qr-empty{
  display:flex; flex-direction:column; align-items:center; gap:12px;
  color:var(--txt2); text-align:center;
}
.qr-empty svg{opacity:0.6}

/* QR Image Container - CENTER & SCALE */
#qrcode, .qr-stage img, .qr-stage canvas {
  display:block !important;
  margin:0 auto !important;
  max-width:400px !important;
  max-height:400px !important;
  width:auto !important;
  height:auto !important;
  border-radius:var(--r2);
  padding:12px;
  background:#fff;
  box-shadow:0 12px 40px rgba(0,0,0,0.4);
}

/* Download Button */
.download-qr-btn{
  margin-top:1rem; padding:8px 20px; border:1px solid var(--bdr2);
  border-radius:30px; background:var(--card2); color:var(--txt);
  font-size:13px; cursor:pointer; transition:0.2s;
}
.download-qr-btn:hover{background:var(--g1); border-color:var(--g1)}

/* 🎚️ Size Slider */
.size-track{display:flex; align-items:center; gap:14px; margin:1rem 0 1.25rem}
.size-track input[type="range"]{
  flex:1; -webkit-appearance:none; height:6px;
  background:linear-gradient(90deg,var(--g1),var(--g3));
  border-radius:3px; cursor:pointer;
}
.size-track input::-webkit-slider-thumb{
  -webkit-appearance:none; width:20px; height:20px;
  border-radius:50%; background:#fff; border:2px solid var(--g1);
  cursor:pointer; box-shadow:0 2px 8px rgba(0,0,0,0.3);
}
.size-badge{
  font-size:13px; font-weight:600; color:var(--txt);
  background:var(--card2); border:1px solid var(--bdr2);
  padding:6px 14px; border-radius:20px; min-width:70px; text-align:center;
}

/* 🔗 Short Result */
#result{margin-top:1rem}
.short-card{
  background:var(--card2); border:1px solid var(--bdr2);
  border-radius:var(--r2); padding:1rem;
}
.short-link-row{
  display:flex; align-items:center; justify-content:space-between;
  gap:10px; background:rgba(0,0,0,0.25); border-radius:30px;
  padding:6px 6px 6px 14px;
}
.short-link{font-family:monospace; font-size:13px; color:#a5f3fc; word-break:break-all}
.copy-btn{
  background:var(--g1); border:none; border-radius:24px;
  padding:5px 12px; color:#fff; font-size:12px; cursor:pointer;
}
.copy-btn:hover{background:var(--g2)}
.original-url{font-size:11px; color:var(--txt2); margin-top:8px; word-break:break-all}

/* 🍞 Toast */
.toast{
  position:fixed; bottom:24px; left:50%;
  transform:translateX(-50%) translateY(20px);
  background:linear-gradient(135deg,var(--g1),var(--g2));
  color:#fff; padding:12px 24px; border-radius:30px;
  font-size:14px; font-weight:600; z-index:9999;
  opacity:0; transition:all 0.3s ease; pointer-events:none;
  box-shadow:0 8px 24px rgba(99,102,241,0.4);
}
.toast.show{opacity:1; transform:translateX(-50%) translateY(0)}
.toast.err{background:linear-gradient(135deg,#dc2626,#b91c1c)}

/* 🎭 Panel Transition */
.panel{display:none; opacity:0; transition:opacity 0.25s ease}
.panel.active{display:block; opacity:1}

/* 📱 Responsive */
@media(max-width:640px){
  .app{padding:1.5rem; min-height:auto}
  .header h1{font-size:24px}
  .input-row{flex-direction:column}
  .btn-gen{width:100%}
  .tabs{flex-wrap:wrap}
  .qr-stage{min-height:380px; padding:1rem}
  #qrcode, .qr-stage img, .qr-stage canvas{max-width:95vw !important}
}
</style>
</head>
<body>

<div class="app">
  <div class="header">
    <h1>SOLITOOLS</h1>
    <p>QR code & persingkat tautan — gratis, cepat, instan</p>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="sw('qr',this)"><span>⬛ QR Generator</span></button>
    <button class="tab" onclick="sw('short',this)"><span>🔗 Persingkat Tautan</span></button>
  </div>

  <!-- QR Panel -->
  <div id="qr" class="panel active">
    <div class="field-label">URL atau Teks</div>
    <div class="input-row">
      <input class="inp" id="qi" placeholder="https://contoh.com " oninput="resetQR&&resetQR()">
      <button class="btn-gen" id="genBtn" onclick="genQR&&genQR()">Buat QR ↗</button>
    </div>
    
    <div class="field-label">Ukuran QR</div>
    <div class="size-track">
      <input type="range" min="120" max="400" step="40" value="200" id="qs"
             oninput="document.getElementById('szv').textContent=this.value+'px';resetQR&&resetQR()">
      <div class="size-badge" id="szv">200px</div>
    </div>
    
    <div class="qr-stage" id="qr-stage">
      <div class="qr-empty" id="qrPlaceholder">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <rect x="3" y="3" width="7" height="7" rx="1.5"/>
          <rect x="14" y="3" width="7" height="7" rx="1.5"/>
          <rect x="3" y="14" width="7" height="7" rx="1.5"/>
          <circle cx="17.5" cy="17.5" r="2.5"/>
        </svg>
        <span>Masukkan URL lalu klik <strong>Buat QR</strong></span>
      </div>
      <!-- QR will be injected here by backend script -->
    </div>
  </div>

  <!-- Shortener Panel -->
  <div id="short" class="panel">
    <div class="field-label">Tempel URL Panjang</div>
    <div class="input-row">
      <input class="inp" id="url" placeholder="https://tautan-sangat-panjang.com/path/... ">
      <button class="btn-gen" id="shortBtn" onclick="shorten&&shorten()">Persingkat ↗</button>
    </div>
    <div id="result"></div>
  </div>
</div>

<!-- Toast Container -->
<div id="toast" class="toast"></div>

<script>
// ── TAB SWITCHER (ORIGINAL - TIDAK DIUBAH) ─────────────────
function sw(id, el) {
  document.querySelectorAll('.panel').forEach(function(p) {
    p.classList.remove('active');
    setTimeout(function() {
      if (!p.classList.contains('active')) p.style.display = 'none';
    }, 300);
  });
  document.querySelectorAll('.tab').forEach(function(t) { t.classList.remove('active'); });
  var panel = document.getElementById(id);
  panel.style.display = 'block';
  setTimeout(function() { panel.classList.add('active'); }, 10);
  el.classList.add('active');
}

// ── HELPER: Toast (digunakan oleh backend script) ──────────
function showToast(msg, isErr) {
  var t = document.getElementById('toast');
  if (!t) { t = document.createElement('div'); t.id = 'toast'; t.className = 'toast'; document.body.appendChild(t); }
  t.textContent = msg;
  t.className = 'toast' + (isErr ? ' err' : '');
  requestAnimationFrame(function(){
    setTimeout(function(){ t.classList.add('show'); }, 10);
    setTimeout(function(){ t.classList.remove('show'); }, 3000);
  });
}

// ── QR CENTERING FIX: Observes when QR is injected ─────────
// Backend script will inject <img> or <canvas> into #qr-stage
// This ensures it's centered and placeholder is hidden
(function(){
  var stage = document.getElementById('qr-stage');
  var placeholder = document.getElementById('qrPlaceholder');
  
  var observer = new MutationObserver(function(mutations) {
    mutations.forEach(function(m) {
      m.addedNodes.forEach(function(node) {
        if (node.nodeType === 1) { // element
          // Hide placeholder if QR element added
          if (node.tagName === 'IMG' || node.tagName === 'CANVAS' || node.id === 'qrcode') {
            if (placeholder) placeholder.style.display = 'none';
            // Ensure centering styles
            node.style.margin = '0 auto';
            node.style.display = 'block';
            node.style.maxWidth = '400px';
            node.style.maxHeight = '400px';
          }
        }
      });
    });
  });
  
  if (stage && window.MutationObserver) {
    observer.observe(stage, { childList: true, subtree: true });
  }
})();

// ── BACKEND SCRIPT LOADER (100% ORIGINAL - JANGAN DIUBAH) ──
// genQR, shorten, cp, resetQR dimuat dari /api/s via HMAC token
(function(){
  function showErr(msg) {
    console.error('[QRTools]', msg);
    var t = document.createElement('div');
    t.className = 'toast err';
    t.textContent = msg;
    document.body.appendChild(t);
    requestAnimationFrame(function(){
      setTimeout(function(){ t.classList.add('show'); }, 10);
      setTimeout(function(){ t.classList.remove('show'); setTimeout(function(){ t.remove(); }, 300); }, 5000);
    });
  }

  // Step 1: ambil token
  fetch('/api/token')
    .then(function(r) {
      if (!r.ok) { showErr('Gagal ambil token (' + r.status + '). Cek APP_SECRET di Vercel.'); return null; }
      return r.json();
    })
    .then(function(d) {
      if (!d || !d.t) return null;
      // Step 2: ambil script pakai token
      return fetch('/api/s?t=' + encodeURIComponent(d.t));
    })
    .then(function(r) {
      if (!r) return null;
      if (!r.ok) { showErr('Gagal ambil script (' + r.status + ').'); return null; }
      return r.text();
    })
    .then(function(code) {
      if (!code) return;
      try {
        (new Function(code))();
        console.log('[QRTools] Script berhasil dimuat. genQR:', typeof window.genQR, '| shorten:', typeof window.shorten);
      } catch(e) {
        showErr('Error saat jalankan script: ' + e.message);
        console.error('[QRTools] Script error:', e);
      }
    })
    .catch(function(e) {
      showErr('Fetch error: ' + e.message);
    });
})();
</script>
</body>
</html>
