<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SOLITOOLS</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:opsz,wght@9..40,400;500;600;700&display=swap" rel="stylesheet">
<style>
/* --- CSS VARIABLES & RESET --- */
:root {
  --primary: #6366f1;
  --primary-dark: #4f46e5;
  --secondary: #8b5cf6;
  --accent: #06b6d4;
  --bg-dark: #020617;
  --bg-card: rgba(30, 41, 59, 0.9);
  --bg-input: rgba(15, 23, 42, 0.8);
  --bg-result: rgba(99, 102, 241, 0.1);
  --border: rgba(255,255,255,0.15);
  --text-main: #f8fafc;
  --text-muted: #cbd5e1;
  --radius: 16px;
  --radius-sm: 12px;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
  font-family: 'DM Sans', sans-serif;
  background-color: var(--bg-dark);
  background-image: 
    radial-gradient(circle at 20% 10%, rgba(99, 102, 241, 0.15), transparent 40%),
    radial-gradient(circle at 80% 90%, rgba(139, 92, 246, 0.15), transparent 40%);
  color: var(--text-main);
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: flex-start;
  padding: 20px 16px 40px;
}

/* --- APP CONTAINER --- */
.app {
  width: 100%;
  max-width: 480px;
  background: var(--bg-card);
  backdrop-filter: blur(20px);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 24px 20px;
  box-shadow: 0 10px 40px rgba(0,0,0,0.5);
}

/* --- HEADER --- */
.header { text-align: center; margin-bottom: 24px; }
.header h1 {
  font-family: 'Syne', sans-serif;
  font-size: 32px;
  font-weight: 800;
  background: linear-gradient(135deg, #fff, #a5f3fc);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  margin-bottom: 4px;
}
.header p { color: var(--text-muted); font-size: 15px; }

/* --- TABS --- */
.tabs {
  display: flex;
  background: rgba(0,0,0,0.3);
  padding: 5px;
  border-radius: 12px;
  margin-bottom: 24px;
  border: 1px solid var(--border);
}
.tab {
  flex: 1;
  padding: 14px;
  border: none;
  background: transparent;
  color: var(--text-muted);
  font-weight: 700;
  font-size: 15px;
  border-radius: 10px;
  cursor: pointer;
  transition: all 0.2s ease;
}
.tab.active {
  background: linear-gradient(135deg, var(--primary), var(--secondary));
  color: white;
  box-shadow: 0 4px 12px rgba(99, 102, 241, 0.4);
}
.tab:hover:not(.active) {
  background: rgba(255,255,255,0.05);
  color: var(--text-main);
}

/* --- PANELS --- */
.panel { display: none; }
.panel.active { display: block; animation: fadeIn 0.3s ease; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

/* --- FORM ELEMENTS --- */
.label {
  font-size: 13px;
  font-weight: 700;
  text-transform: uppercase;
  color: var(--primary);
  margin-bottom: 10px;
  display: block;
  letter-spacing: 0.5px;
}

.input-row {
  display: flex;
  flex-direction: column;
  gap: 12px;
  margin-bottom: 20px;
}

.inp {
  width: 100%;
  background: var(--bg-input);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 16px;
  color: var(--text-main);
  font-size: 16px;
  font-family: inherit;
  transition: all 0.2s ease;
}
.inp:focus {
  border-color: var(--primary);
  outline: none;
  box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
  background: rgba(15, 23, 42, 0.9);
}
.inp::placeholder { color: rgba(203, 213, 225, 0.5); }

.btn-gen {
  width: 100%;
  background: linear-gradient(135deg, var(--primary), var(--secondary));
  color: white;
  border: none;
  border-radius: var(--radius-sm);
  padding: 16px;
  font-weight: 700;
  font-size: 16px;
  cursor: pointer;
  transition: all 0.2s ease;
  box-shadow: 0 4px 15px rgba(99, 102, 241, 0.4);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}
.btn-gen:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(99, 102, 241, 0.5);
}
.btn-gen:active { transform: translateY(0) scale(0.98); }

/* --- SLIDER --- */
.size-track {
  display: flex;
  align-items: center;
  gap: 15px;
  margin: 20px 0;
  background: rgba(255,255,255,0.05);
  padding: 16px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
}
input[type=range] {
  flex: 1;
  -webkit-appearance: none;
  height: 6px;
  background: linear-gradient(90deg, var(--primary), var(--accent));
  border-radius: 3px;
  cursor: pointer;
}
input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 24px;
  height: 24px;
  background: white;
  border-radius: 50%;
  border: 3px solid var(--primary);
  cursor: pointer;
  box-shadow: 0 2px 8px rgba(0,0,0,0.3);
  transition: transform 0.1s;
}
input[type=range]::-webkit-slider-thumb:hover {
  transform: scale(1.1);
}
.size-badge {
  background: rgba(99, 102, 241, 0.2);
  color: #e0e7ff;
  padding: 8px 16px;
  border-radius: 20px;
  font-weight: 700;
  font-size: 14px;
  min-width: 70px;
  text-align: center;
  border: 1px solid rgba(99, 102, 241, 0.3);
}

/* --- QR STAGE --- */
.qr-stage {
  background: rgba(0,0,0,0.2);
  border: 1px dashed var(--border);
  border-radius: var(--radius);
  min-height: 280px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 20px;
  margin-top: 10px;
  text-align: center;
  overflow: hidden;
}
.qr-stage img, .qr-stage canvas, .qr-stage div[id^="qrcode"] {
  max-width: 100%;
  height: auto;
  display: block;
  margin: 0 auto;
}

/* Tombol Download PNG dengan background */
.download-qr-btn {
  margin-top: 15px;
  background: linear-gradient(135deg, var(--primary), var(--secondary));
  border: none;
  color: white;
  padding: 12px 24px;
  border-radius: var(--radius-sm);
  font-weight: 600;
  font-size: 14px;
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  gap: 8px;
  box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
  transition: all 0.2s ease;
}
.download-qr-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 16px rgba(99, 102, 241, 0.4);
}

/* --- SHORTENER RESULT (Dengan Background Card) --- */
#result { margin-top: 15px; }

.short-card {
  background: var(--bg-result);
  border: 1px solid rgba(99, 102, 241, 0.3);
  border-radius: var(--radius-sm);
  padding: 16px;
  margin-top: 10px;
  animation: slideUp 0.3s ease;
}
@keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

.short-link-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  background: rgba(0,0,0,0.3);
  padding: 12px;
  border-radius: 30px;
  margin-bottom: 10px;
  border: 1px solid var(--border);
}

.short-link {
  color: var(--accent);
  font-family: 'DM Sans', monospace;
  font-size: 14px;
  font-weight: 600;
  word-break: break-all;
  flex: 1;
}

.copy-btn {
  background: var(--primary);
  border: none;
  color: white;
  padding: 8px 16px;
  border-radius: 20px;
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.2s ease;
  white-space: nowrap;
  flex-shrink: 0;
}
.copy-btn:hover {
  background: var(--primary-dark);
  transform: translateY(-1px);
}
.copy-btn:active {
  transform: translateY(0);
}

.original-url {
  font-size: 12px;
  color: var(--text-muted);
  word-break: break-all;
  margin-top: 8px;
  display: block;
  line-height: 1.4;
}

/* --- TOAST --- */
.toast {
  position: fixed;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: #1e293b;
  color: white;
  padding: 12px 24px;
  border-radius: 50px;
  font-size: 14px;
  font-weight: 600;
  z-index: 9999;
  opacity: 0;
  transition: all 0.3s ease;
  pointer-events: none;
  border: 1px solid var(--border);
  box-shadow: 0 5px 20px rgba(0,0,0,0.4);
}
.toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}
.toast.err {
  background: #450a0a;
  border-color: #ef4444;
  color: #fca5a5;
}
.toast.success {
  background: #064e3b;
  border-color: #10b981;
  color: #6ee7b7;
}

/* --- RESPONSIVE DESKTOP --- */
@media (min-width: 768px) {
  .input-row {
    flex-direction: row;
  }
  .inp {
    flex: 1;
  }
  .btn-gen {
    width: auto;
    padding: 16px 32px;
  }
}
</style>
</head>
<body>

<div class="app">
  <div class="header">
    <h1>SOLITOOLS</h1>
    <p>QR & Shortener — Cepat & Gratis</p>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="sw('qr',this)">⬛ QR Code</button>
    <button class="tab" onclick="sw('short',this)">🔗 Pendekkan Link</button>
  </div>

  <!-- QR Panel -->
  <div id="qr" class="panel active">
    <label class="label">URL atau Teks</label>
    <div class="input-row">
      <input class="inp" id="qi" placeholder="https://contoh.com" oninput="if(typeof resetQR==='function') resetQR()">
      <button class="btn-gen" id="genBtn" onclick="if(typeof genQR==='function') genQR()">
        <span>Buat QR</span>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="M12 5l7 7-7 7"/></svg>
      </button>
    </div>

    <label class="label">Ukuran QR</label>
    <div class="size-track">
      <input type="range" min="120" max="400" step="40" value="200" id="qs"
             oninput="document.getElementById('szv').textContent=this.value+'px'; if(typeof resetQR==='function') resetQR()">
      <div class="size-badge" id="szv">200px</div>
    </div>

    <div class="qr-stage" id="qr-stage">
      <div id="qr-empty-msg" style="color:var(--text-muted); display:flex; flex-direction:column; align-items:center; gap:10px;">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <rect x="3" y="3" width="7" height="7"/>
          <rect x="14" y="3" width="7" height="7"/>
          <rect x="3" y="14" width="7" height="7"/>
          <circle cx="17.5" cy="17.5" r="2.5"/>
        </svg>
        <span>Masukkan URL lalu klik Buat QR</span>
      </div>
      <!-- Backend akan inject QR di sini -->
    </div>
  </div>

  <!-- Shortener Panel -->
  <div id="short" class="panel">
    <label class="label">Tempel URL Panjang</label>
    <div class="input-row">
      <input class="inp" id="url" placeholder="https://link-panjang.com/...">
      <button class="btn-gen" id="shortBtn" onclick="if(typeof shorten==='function') shorten()">
        <span>Persingkat</span>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
      </button>
    </div>
    <div id="result"></div>
  </div>
</div>

<div id="toast" class="toast"></div>

<script>
// 1. Tab Switcher
function sw(id, el) {
  document.querySelectorAll('.panel').forEach(p => {
    p.classList.remove('active');
    setTimeout(() => { if(!p.classList.contains('active')) p.style.display = 'none'; }, 200);
  });
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  
  const panel = document.getElementById(id);
  panel.style.display = 'block';
  setTimeout(() => panel.classList.add('active'), 10);
  el.classList.add('active');
}

// 2. Helper Toast
function showToast(msg, isErr = false) {
  let t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast' + (isErr ? ' err' : '');
  setTimeout(() => t.classList.add('show'), 10);
  setTimeout(() => t.classList.remove('show'), 3000);
}

// 3. BACKEND LOADER (100% ASLI - TIDAK DIUBAH)
(function(){
  function showErr(msg) {
    console.error('[System]', msg);
  }

  fetch('/api/token')
    .then(r => {
      if (!r.ok) throw new Error('Token failed ('+r.status+')');
      return r.json();
    })
    .then(d => {
      if (!d || !d.t) return null;
      return fetch('/api/s?t=' + encodeURIComponent(d.t));
    })
    .then(r => {
      if (!r) return null;
      if (!r.ok) throw new Error('Script failed ('+r.status+')');
      return r.text();
    })
    .then(code => {
      if (!code) return;
      try {
        new Function(code)();
        console.log('[System] Backend loaded successfully.');
      } catch(e) {
        showErr('Script error: ' + e.message);
      }
    })
    .catch(e => {
      showErr('Connection error: ' + e.message);
    });
})();
</script>
</body>
</html>
