<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>SOLITOOLS</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@300;400;500;600;700&display=swap');

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}

:root {
  --g1: #6366f1;
  --g2: #8b5cf6;
  --g3: #06b6d4;
  --glass-bg: rgba(10, 8, 25, 0.65);
  --card-bg: rgba(255, 255, 255, 0.03);
  --card-hover: rgba(255, 255, 255, 0.07);
  --border-subtle: rgba(255, 255, 255, 0.08);
  --border-glow: rgba(99, 102, 241, 0.5);
  --text-primary: #f1f5f9;
  --text-secondary: #cbd5e6;
  --text-muted: #7e8aa8;
  --radius-xl: 28px;
  --radius-lg: 20px;
  --radius-md: 16px;
  --radius-sm: 12px;
  --shadow-heavy: 0 25px 45px -12px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255, 255, 255, 0.02);
  --shadow-glow: 0 8px 20px rgba(99, 102, 241, 0.25);
}

body {
  background: radial-gradient(circle at 20% 30%, #0c0a2a, #02010a);
  font-family: 'DM Sans', sans-serif;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 2rem 1.5rem;
}

/* Main app card */
.app {
  background: var(--glass-bg);
  backdrop-filter: blur(8px);
  border-radius: var(--radius-xl);
  width: 100%;
  max-width: 780px;
  padding: 2rem 2rem 2.5rem;
  border: 1px solid var(--border-subtle);
  box-shadow: var(--shadow-heavy);
  position: relative;
  overflow: hidden;
  transition: all 0.3s ease;
}

/* Decorative blobs */
.app::before {
  content: '';
  position: absolute;
  top: -80px;
  right: -80px;
  width: 320px;
  height: 320px;
  background: radial-gradient(circle, rgba(99, 102, 241, 0.35), transparent 70%);
  filter: blur(70px);
  pointer-events: none;
  z-index: 0;
  animation: floatBlob 12s infinite alternate;
}

.app::after {
  content: '';
  position: absolute;
  bottom: -100px;
  left: -80px;
  width: 280px;
  height: 280px;
  background: radial-gradient(circle, rgba(6, 182, 212, 0.25), transparent 70%);
  filter: blur(70px);
  pointer-events: none;
  z-index: 0;
  animation: floatBlob2 10s infinite alternate;
}

@keyframes floatBlob {
  0% { transform: translate(0, 0) scale(1); opacity: 0.5; }
  100% { transform: translate(30px, -20px) scale(1.15); opacity: 0.8; }
}

@keyframes floatBlob2 {
  0% { transform: translate(0, 0) scale(1); }
  100% { transform: translate(-20px, 30px) scale(1.2); }
}

/* Header */
.header {
  position: relative;
  z-index: 2;
  margin-bottom: 2rem;
  text-align: center;
}

.header h1 {
  font-family: 'Syne', sans-serif;
  font-size: 2.4rem;
  font-weight: 800;
  background: linear-gradient(135deg, #e0e7ff, #a5f3fc, #c084fc);
  background-size: 200% auto;
  -webkit-background-clip: text;
  background-clip: text;
  -webkit-text-fill-color: transparent;
  letter-spacing: -0.02em;
  margin-bottom: 0.3rem;
}

.header p {
  color: var(--text-muted);
  font-weight: 500;
  font-size: 0.9rem;
}

/* Tabs */
.tabs {
  display: flex;
  gap: 12px;
  background: rgba(0, 0, 0, 0.3);
  backdrop-filter: blur(4px);
  padding: 6px;
  border-radius: 60px;
  margin-bottom: 2rem;
  border: 1px solid var(--border-subtle);
  position: relative;
  z-index: 2;
}

.tab {
  flex: 1;
  background: transparent;
  border: none;
  padding: 12px 8px;
  font-weight: 700;
  font-size: 0.95rem;
  font-family: 'Syne', sans-serif;
  color: var(--text-muted);
  border-radius: 40px;
  cursor: pointer;
  transition: all 0.25s cubic-bezier(0.2, 0.9, 0.4, 1.1);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}

.tab span {
  font-size: 1rem;
}

.tab.active {
  background: linear-gradient(115deg, var(--g1), var(--g2));
  color: white;
  box-shadow: var(--shadow-glow);
}

.tab:not(.active):hover {
  background: var(--card-hover);
  color: var(--text-primary);
}

/* Panels */
.panel {
  display: none;
  animation: fadeSlideUp 0.3s ease forwards;
  position: relative;
  z-index: 2;
}

.panel.active {
  display: block;
}

@keyframes fadeSlideUp {
  from {
    opacity: 0;
    transform: translateY(8px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

/* Field labels */
.field-label {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 0.7rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--text-secondary);
  margin-bottom: 12px;
  font-family: 'Syne', sans-serif;
}

.field-label::before {
  content: '';
  width: 8px;
  height: 8px;
  background: linear-gradient(145deg, var(--g1), var(--g3));
  border-radius: 2px;
  display: inline-block;
}

/* Input row */
.input-row {
  display: flex;
  gap: 14px;
  margin-bottom: 24px;
  flex-wrap: wrap;
}

.inp {
  flex: 1;
  background: rgba(0, 0, 0, 0.4);
  backdrop-filter: blur(4px);
  border: 1.5px solid var(--border-subtle);
  border-radius: var(--radius-md);
  padding: 1rem 1.2rem;
  color: var(--text-primary);
  font-size: 1rem;
  font-weight: 500;
  transition: all 0.2s;
  font-family: 'DM Sans', sans-serif;
}

.inp:focus {
  outline: none;
  border-color: var(--g1);
  box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.25);
  background: rgba(15, 20, 40, 0.7);
}

.inp::placeholder {
  color: #5e6c8c;
  font-weight: 400;
}

.btn-gen {
  background: linear-gradient(105deg, var(--g1), var(--g2));
  border: none;
  border-radius: var(--radius-md);
  padding: 0 1.8rem;
  font-weight: 700;
  font-family: 'Syne', sans-serif;
  font-size: 0.9rem;
  color: white;
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  gap: 8px;
  transition: all 0.2s ease;
  box-shadow: var(--shadow-glow);
  white-space: nowrap;
}

.btn-gen:hover {
  transform: translateY(-2px);
  box-shadow: 0 12px 28px rgba(99, 102, 241, 0.4);
  filter: brightness(1.02);
}

.btn-gen:active {
  transform: scale(0.97);
}

/* Size slider */
.size-track {
  display: flex;
  align-items: center;
  gap: 20px;
  margin: 20px 0 28px;
}

.size-track input[type="range"] {
  flex: 1;
  height: 6px;
  -webkit-appearance: none;
  background: linear-gradient(90deg, var(--g1), var(--g3));
  border-radius: 10px;
}

.size-track input[type="range"]:focus {
  outline: none;
}

.size-track input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 20px;
  height: 20px;
  background: white;
  border-radius: 50%;
  box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.4), 0 2px 8px black;
  cursor: pointer;
  transition: 0.1s;
}

.size-badge {
  background: rgba(99, 102, 241, 0.2);
  backdrop-filter: blur(4px);
  padding: 8px 18px;
  border-radius: 40px;
  font-weight: 800;
  font-size: 0.9rem;
  color: white;
  border: 1px solid rgba(99, 102, 241, 0.5);
  font-family: monospace;
  min-width: 85px;
  text-align: center;
}

/* QR stage */
.qr-stage {
  background: rgba(0, 0, 0, 0.3);
  backdrop-filter: blur(8px);
  border-radius: var(--radius-lg);
  border: 1px solid rgba(99, 102, 241, 0.3);
  padding: 2rem 1.5rem;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  transition: all 0.3s;
  min-height: 450px;
  text-align: center;
}

.qr-empty {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 1rem;
  color: var(--text-muted);
}

.qr-empty svg {
  opacity: 0.6;
  margin-bottom: 0.5rem;
}

/* Shortener result */
#result {
  margin-top: 1.5rem;
}

.short-result-card {
  background: linear-gradient(135deg, rgba(99, 102, 241, 0.1), rgba(6, 182, 212, 0.05));
  border-radius: var(--radius-md);
  padding: 1.2rem;
  border: 1px solid rgba(99, 102, 241, 0.4);
  backdrop-filter: blur(4px);
  transition: all 0.2s;
}

.short-link-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  flex-wrap: wrap;
  background: rgba(0, 0, 0, 0.3);
  border-radius: 60px;
  padding: 8px 8px 8px 20px;
  margin-bottom: 10px;
  border: 1px solid var(--border-subtle);
}

.short-link {
  font-family: monospace;
  font-size: 0.85rem;
  word-break: break-all;
  color: #a5f3fc;
  font-weight: 500;
}

.copy-btn {
  background: var(--g1);
  border: none;
  border-radius: 40px;
  padding: 6px 16px;
  color: white;
  font-weight: 600;
  cursor: pointer;
  transition: 0.2s;
  font-size: 0.7rem;
  display: inline-flex;
  align-items: center;
  gap: 6px;
}

.copy-btn:hover {
  background: var(--g2);
  transform: scale(0.97);
}

.original-url {
  font-size: 0.7rem;
  color: var(--text-muted);
  margin-top: 8px;
  word-break: break-all;
  padding-left: 8px;
}

/* Toast notification */
.toast {
  position: fixed;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%) translateY(30px);
  background: #1e293b;
  backdrop-filter: blur(20px);
  color: white;
  padding: 12px 28px;
  border-radius: 60px;
  font-weight: 600;
  font-size: 0.85rem;
  box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
  z-index: 9999;
  opacity: 0;
  transition: all 0.25s ease;
  pointer-events: none;
  border-left: 4px solid var(--g1);
}

.toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

.toast.err {
  background: #991b1b;
  border-left-color: #f97316;
}

/* Responsive */
@media (max-width: 680px) {
  .app {
    padding: 1.5rem;
  }
  .header h1 {
    font-size: 1.8rem;
  }
  .input-row {
    flex-direction: column;
  }
  .btn-gen {
    padding: 1rem;
    justify-content: center;
  }
  .size-track {
    gap: 12px;
  }
  .qr-stage {
    padding: 1rem;
    min-height: 380px;
  }
  .tab span {
    font-size: 0.85rem;
  }
  .short-link-row {
    flex-direction: column;
    align-items: stretch;
    border-radius: var(--radius-md);
    padding: 12px;
  }
  .copy-btn {
    justify-content: center;
  }
}

@media (max-width: 480px) {
  .qr-stage img {
    max-width: 90vw;
    height: auto;
  }
}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>SOLITOOLS</h1>
    <p>QR code &amp; persingkat tautan — gratis, cepat, instan</p>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="sw('qr',this)"><span>⬛ QR Generator</span></button>
    <button class="tab" onclick="sw('short',this)"><span>🔗 Persingkat Tautan</span></button>
  </div>

  <div id="qr" class="panel active">
    <div class="field-label">URL atau Teks</div>
    <div class="input-row">
      <input class="inp" id="qi" placeholder="https://contoh.com" oninput="resetQR&&resetQR()">
      <button class="btn-gen" id="genBtn" onclick="genQR&&genQR()">Buat QR ↗</button>
    </div>
    <div class="field-label">Ukuran QR</div>
    <div class="size-track">
      <input type="range" min="120" max="400" step="40" value="200" id="qs"
             oninput="document.getElementById('szv').textContent=this.value+'px';resetQR&&resetQR()">
      <div class="size-badge" id="szv">200px</div>
    </div>
    <div class="qr-stage" id="qr-stage">
      <div class="qr-empty">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2">
          <rect x="3" y="3" width="7" height="7" rx="1.5" />
          <rect x="14" y="3" width="7" height="7" rx="1.5" />
          <rect x="3" y="14" width="7" height="7" rx="1.5" />
          <circle cx="17.5" cy="17.5" r="2.5" fill="none" stroke="currentColor" />
        </svg>
        <span>Masukkan URL lalu klik Buat QR</span>
      </div>
    </div>
  </div>

  <div id="short" class="panel">
    <div class="field-label">Tempel URL Panjang</div>
    <div class="input-row">
      <input class="inp" id="url" placeholder="https://tautan-sangat-panjang.com/path/...">
      <button class="btn-gen" id="shortBtn" onclick="shorten&&shorten()">Persingkat ↗</button>
    </div>
    <div id="result"></div>
  </div>
</div>

<script>
// ── TAB SWITCHER (tidak diubah) ──
function sw(id, el) {
  document.querySelectorAll('.panel').forEach(function(p) {
    p.classList.remove('active');
    setTimeout(function() {
      if (!p.classList.contains('active')) p.style.display = 'none';
    }, 300);
  });
  document.querySelectorAll('.tab').forEach(function(t) { t.classList.remove('active'); });
  var panel = document.getElementById(id);
  panel.style.display = 'block';
  setTimeout(function() { panel.classList.add('active'); }, 10);
  el.classList.add('active');
}

// ── LOAD LOGIC DARI API (tetap sama) ──
(function(){
  function showErr(msg) {
    console.error('[QRTools]', msg);
    var t = document.createElement('div');
    t.className = 'toast err';
    t.textContent = msg;
    document.body.appendChild(t);
    requestAnimationFrame(function(){
      setTimeout(function(){ t.classList.add('show'); }, 10);
      setTimeout(function(){ t.classList.remove('show'); setTimeout(function(){ t.remove(); }, 300); }, 5000);
    });
  }

  fetch('/api/token')
    .then(function(r) {
      if (!r.ok) { showErr('Gagal ambil token (' + r.status + '). Cek APP_SECRET di Vercel.'); return null; }
      return r.json();
    })
    .then(function(d) {
      if (!d || !d.t) return null;
      return fetch('/api/s?t=' + encodeURIComponent(d.t));
    })
    .then(function(r) {
      if (!r) return null;
      if (!r.ok) { showErr('Gagal ambil script (' + r.status + ').'); return null; }
      return r.text();
    })
    .then(function(code) {
      if (!code) return;
      try {
        (new Function(code))();
        console.log('[QRTools] Script berhasil dimuat. genQR:', typeof window.genQR, '| shorten:', typeof window.shorten);
      } catch(e) {
        showErr('Error saat jalankan script: ' + e.message);
        console.error('[QRTools] Script error:', e);
      }
    })
    .catch(function(e) {
      showErr('Fetch error: ' + e.message);
    });
})();
</script>
</body>
</html>
